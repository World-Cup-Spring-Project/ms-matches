spring:
  application:
    name: ms-matches
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    mongodb:
      uri: ${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/ms_matches}}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      acks: all
      properties:
        enable.idempotence: true
  jackson:
    default-property-inclusion: non_null
    datatype:
      datetime:
        write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_SERVER_URL:http://localhost:8761/eureka/}}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
  health:
    kafka:
      enabled: false

integrations:
  core-data:
    base-url: ${CORE_DATA_BASE_URL:${CORE_DATA_URL:http://localhost:8081}}
    sync-enabled: ${CORE_DATA_SYNC_ENABLED:true}
    sync-on-startup: ${CORE_DATA_SYNC_ON_STARTUP:true}
    sync-interval-ms: ${CORE_DATA_SYNC_INTERVAL_MS:300000}
    games-path: ${CORE_DATA_GAMES_PATH:/games}
    game-by-id-path: ${CORE_DATA_GAME_BY_ID_PATH:/games/{gameId}}

arenacup:
  kafka:
    topics:
      match-status-changed: match-status-changed-events

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
