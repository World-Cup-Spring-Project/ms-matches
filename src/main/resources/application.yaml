spring:
  application:
    name: ms-matches
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mongodb:
    uri: ${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/ms_matches}}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,kafka
  health:
    kafka:
      enabled: true

integrations:
  core-data:
    base-url: ${CORE_DATA_BASE_URL:${CORE_DATA_URL:http://localhost:8081}}
    validation-enabled: ${CORE_DATA_VALIDATION_ENABLED:false}

arenacup:
  kafka:
    topics:
      match-status-changed: match-status-changed-events
