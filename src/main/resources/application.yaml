spring:
  application:
    name: ms-matches
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mongodb:
    uri: ${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/ms_matches}}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
  jackson:
    default-property-inclusion: non_null
    datatype:
      datetime:
        write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState

integrations:
  core-data:
    base-url: ${CORE_DATA_BASE_URL:${CORE_DATA_URL:http://localhost:8081}}
    validation-enabled: ${CORE_DATA_VALIDATION_ENABLED:false}

arenacup:
  kafka:
    topics:
      match-status-changed: match-status-changed-events
