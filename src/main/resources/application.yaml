spring:
  application:
    name: ms-matches
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    mongodb:
      uri: ${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/ms_matches}}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      acks: all
      properties:
        enable.idempotence: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
  health:
    kafka:
      enabled: false

integrations:
  core-data:
    base-url: ${CORE_DATA_BASE_URL:${CORE_DATA_URL:http://localhost:8081}}
    validation-enabled: ${CORE_DATA_VALIDATION_ENABLED:false}

arenacup:
  kafka:
    topics:
      match-status-changed: match-status-changed-events

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
